services:
  postgres:
    image: postgres:16-alpine
    container_name: claude-token-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: claude_token_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracker_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
